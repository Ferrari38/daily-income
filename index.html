<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คำนวณรายได้ประจำวัน</title>
  
  <!-- ดึงคลังโปรแกรม html2canvas สำหรับจับภาพเฉพาะกรอบสรุปผลเป็นไฟล์ PNG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f2f2f2;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h2 {
      font-size: 24px;
      color: #003300;
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h3 {
      margin-top: 25px;
      font-size: 18px;
      color: #004d00;
      border-bottom: 2px solid #e6ffe6;
      padding-bottom: 5px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      font-weight: bold;
      color: #444;
    }
    input, button, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    input:focus {
      border-color: #28a745;
      outline: none;
    }
    button {
      margin-top: 12px;
      cursor: pointer;
      color: white;
      border: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-calc { background-color: #28a745; margin-top: 20px; font-size: 18px; }
    .btn-calc:hover { background-color: #218838; }
    
    .btn-save { background-color: #007bff; }
    .btn-save:hover { background-color: #0069d9; }
    
    .btn-reset { background-color: #6c757d; }
    .btn-reset:hover { background-color: #5a6268; }

    .btn-danger { background-color: #dc3545; padding: 8px 12px; font-size: 14px; width: auto; float: right; margin-top: 0; }
    .btn-danger:hover { background-color: #bd2130; }

    /* กรอบสีเขียวแสดงผลลัพธ์ */
    .result {
      margin-top: 20px;
      background: #e6ffe6;
      padding: 20px;
      border-radius: 8px;
      color: #006600;
      line-height: 1.8;
      border: 2px dashed #28a745;
      display: none;
    }

    /* สไตล์ส่วนตารางประวัติ */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    .history-table th, .history-table td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    .history-table th {
      background-color: #f8f9fa;
      color: #333;
    }
    .history-table tr:hover {
      background-color: #f1f1f1;
    }
    .action-btns {
      display: flex;
      gap: 5px;
    }
    .btn-view {
      background-color: #17a2b8;
      padding: 6px 12px;
      font-size: 12px;
      margin: 0;
      width: auto;
    }
    .btn-view:hover { background-color: #138496; }
    
    .btn-del {
      background-color: #dc3545;
      padding: 6px 12px;
      font-size: 12px;
      margin: 0;
      width: auto;
    }
    .btn-del:hover { background-color: #c82333; }

    @media (max-width: 500px) {
      .history-table { font-size: 12px; }
      .btn-view, .btn-del { padding: 4px 6px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ฟอร์มกรอกข้อมูลแบบคลีน เริ่มต้นด้วยวันที่ทันที -->
    <label>วันที่:</label>
    <input type="date" id="date" />

    <h3>รายรับ</h3>
    <label>รายได้จาก GRAB (บาท):</label>
    <input type="number" id="grab" placeholder="กรอกจำนวนเงิน" />

    <label>รายได้จาก BOLT (บาท):</label>
    <input type="number" id="bolt" placeholder="กรอกจำนวนเงิน" />

    <label>ทิป (บาท):</label>
    <input type="number" id="tip" placeholder="กรอกจำนวนเงิน" />

    <label>รายรับอื่นๆ (บาท):</label>
    <input type="number" id="extraIncome" placeholder="กรอกจำนวนเงิน" />

    <h3>รายจ่าย</h3>
    <label>ค่าน้ำมัน (บาท):</label>
    <input type="number" id="oil" placeholder="กรอกจำนวนเงิน" />

    <label>รายจ่ายอื่นๆ (บาท):</label>
    <input type="number" id="otherExpense" placeholder="กรอกจำนวนเงิน" />

    <h3>ระยะทางที่ใช้</h3>
    <label>เริ่มงาน (กม.):</label>
    <input type="number" id="startKm" placeholder="กรอกเลขไมล์เริ่มงาน" />

    <label>เลิกงาน (กม.):</label>
    <input type="number" id="endKm" placeholder="กรอกเลขไมล์เลิกงาน" />

    <!-- ปุ่มกดควบคุมฟังก์ชัน -->
    <button class="btn-calc" onclick="calculateAndSave()">📊 คำนวณและบันทึกประวัติ</button>
    <button class="btn-save" onclick="saveAsPNG()">📸 บันทึกรูปภาพสรุปผล (PNG)</button>
    <button class="btn-reset" onclick="resetForm()">🧹 ล้างข้อมูล</button>

    <!-- กล่องสรุปผลสีเขียว เน้นจัดสัดส่วนรายได้สุทธิใหม่ให้ชัดเจน -->
    <div class="result" id="result"></div>
  </div>

  <!-- ส่วนตารางแสดงประวัติย้อนหลัง -->
  <div class="container">
    <h2 style="display: inline-block;">🗂️ ประวัติย้อนหลัง</h2>
    <button class="btn-danger" onclick="clearAllHistory()">⚠️ ล้างประวัติทั้งหมด</button>
    <div style="clear: both;"></div>
    
    <div style="overflow-x: auto;">
      <table class="history-table">
        <thead>
          <tr>
            <th>📅 วันที่</th>
            <th>💵 รายได้สุทธิ</th>
            <th>🛣️ ระยะทาง</th>
            <th>⚙️ จัดการ</th>
          </tr>
        </thead>
        <tbody id="history-list">
          <!-- ข้อมูลจะถูกโหลดเข้ามาด้วย JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;
      displayHistory();
    });

    function calculateAndSave() {
      const date = document.getElementById('date').value;
      if (!date) {
        alert("⚠️ กรุณาเลือกวันที่ก่อนทำการคำนวณ");
        return;
      }

      const grab = parseFloat(document.getElementById('grab').value) || 0;
      const bolt = parseFloat(document.getElementById('bolt').value) || 0;
      const tip = parseFloat(document.getElementById('tip').value) || 0;
      const extraIncome = parseFloat(document.getElementById('extraIncome').value) || 0;
      const oil = parseFloat(document.getElementById('oil').value) || 0;
      const otherExpense = parseFloat(document.getElementById('otherExpense').value) || 0;
      const startKm = parseFloat(document.getElementById('startKm').value) || 0;
      const endKm = parseFloat(document.getElementById('endKm').value) || 0;

      const distance = endKm - startKm;
      if (distance < 0) {
        alert("❌ กรุณากรอกเลขกิโลเมตรให้ถูกต้อง (เลิกงานต้องมากกว่าเริ่มงาน)");
        return;
      }

      const totalIncomeBeforeCommission = grab + bolt + tip + extraIncome;

      // เรทคอมมิชชั่น 19.26%
      const boltCommission = bolt * 0.1926;
      const boltAfter = bolt - boltCommission;
      const totalIncomeBeforeMaintenance = grab + boltAfter + extraIncome;
      const maintenance = totalIncomeBeforeMaintenance * 0.10;

      const totalExpenses = oil + otherExpense + maintenance + boltCommission;
      
      // การคำนวณสัดส่วนรายได้ต่างๆ ตามที่กำหนด
      const netIncome = totalIncomeBeforeMaintenance - totalExpenses + tip; // รายได้สุทธิหลังหักค่าใช้จ่าย
      const netHalf = netIncome / 2; // รายได้สุทธิหาร 2
      const netHalfPlusMaintenance = netHalf + maintenance; // รายได้สุทธิหาร 2 + ค่าซ่อม
      const netHalfPlusTip = netHalf + tip; // รายได้สุทธิหาร 2 + ทิป

      const costPerKm = distance > 0 ? (totalIncomeBeforeCommission / distance).toFixed(2) : "0.00";

      // แสดงผลลัพธ์ในกล่องสรุปผล
      renderResultHTML(date, grab, bolt, boltCommission, boltAfter, extraIncome, totalIncomeBeforeCommission, totalIncomeBeforeMaintenance, maintenance, oil, otherExpense, totalExpenses, netIncome, netHalf, netHalfPlusMaintenance, netHalfPlusTip, tip, distance, costPerKm);

      // บันทึกลงเครื่อง (LocalStorage)
      const record = {
        date, grab, bolt, tip, extraIncome, oil, otherExpense, startKm, endKm, netIncome, distance
      };
      saveToLocalStorage(record);
    }

    function renderResultHTML(date, grab, bolt, boltCommission, boltAfter, extraIncome, totalIncomeBeforeCommission, totalIncomeBeforeMaintenance, maintenance, oil, otherExpense, totalExpenses, netIncome, netHalf, netHalfPlusMaintenance, netHalfPlusTip, tip, distance, costPerKm) {
      const format = n => n.toLocaleString(undefined, { minimumFractionDigits: 2 });
      const resultDiv = document.getElementById('result');

      resultDiv.innerHTML = `
        <h3 style="margin-top:0; border-bottom: 2px solid #28a745; padding-bottom: 8px;">📋 รายงานสรุปผลประจำวันที่: ${date}</h3>
        <strong>💰 รายรับย่อย</strong><br>
        • GRAB: ${format(grab)} บาท<br>
        • BOLT: ${format(bolt)} บาท (หัก 19.26%: ${format(boltCommission)} บาท เหลือ: ${format(boltAfter)} บาท)<br>
        • รายรับอื่นๆ: ${format(extraIncome)} บาท<br>
        • รวมรายรับทั้งหมด (ก่อนหักคอม): ${format(totalIncomeBeforeCommission)} บาท<br><br>

        <strong>⛽ รายจ่ายย่อย</strong><br>
        • ค่าน้ำมัน: ${format(oil)} บาท<br>
        • รายจ่ายอื่นๆ: ${format(otherExpense)} บาท<br>
        • ค่าคอมมิชชั่น BOLT (19.26%): ${format(boltCommission)} บาท<br>
        • รวมรายจ่ายแฝง: ${format(totalExpenses - maintenance)} บาท<br><br>

        <strong style="font-size: 15px; color: #004d00; display: block; border-top: 1px solid #28a745; padding-top: 8px; margin-top: 5px;">📊 สัดส่วนรายได้สุทธิและการแบ่งสรร</strong>
        • ✨ รายได้สุทธิหลังหักค่าใช้จ่าย: <strong>${format(netIncome)}</strong> บาท<br>
        • 👥 รายได้สุทธิหาร 2: <strong>${format(netHalf)}</strong> บาท<br>
        • 🔧 รายได้สุทธิหาร 2 + ค่าซ่อม: <strong>${format(netHalfPlusMaintenance)}</strong> บาท<br>
        • 💵 รายได้สุทธิหาร 2 + ทิป: <strong>${format(netHalfPlusTip)}</strong> บาท<br>
        • 🎁 ทิป: <strong>${format(tip)}</strong> บาท<br>
        • 🛠️ ค่าซ่อม: <strong>${format(maintenance)}</strong> บาท<br><br>

        <span style="font-size: 13px; color: #555; display: block; border-top: 1px dotted #28a745; padding-top: 5px;">
          🏁 ระยะทางวิ่งจริง: ${distance} กม. | 📈 เฉลี่ย: ${costPerKm} บาท/กม.
        </span>
      `;
      resultDiv.style.display = 'block';
    }

    function saveToLocalStorage(newRecord) {
      let history = JSON.parse(localStorage.getItem("driver_income_history")) || [];
      const existingIndex = history.findIndex(item => item.date === newRecord.date);
      
      if (existingIndex !== -1) {
        history[existingIndex] = newRecord;
      } else {
        history.push(newRecord);
      }
      
      history.sort((a, b) => new Date(b.date) - new Date(a.date));
      localStorage.setItem("driver_income_history", JSON.stringify(history));
      displayHistory();
    }

    function displayHistory() {
      const history = JSON.parse(localStorage.getItem("driver_income_history")) || [];
      const historyList = document.getElementById("history-list");
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyList.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">ยังไม่มีประวัติการบันทึก 📭</td></tr>`;
        return;
      }

      history.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.date}</td>
          <td style="color: #006600; font-weight: bold;">${item.netIncome.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</td>
          <td>${item.distance} กม.</td>
          <td class="action-btns">
            <button class="btn-view" onclick="viewHistoryItem(${index})">🔍 ดู</button>
            <button class="btn-del" onclick="deleteHistoryItem(${index})">🗑️ ลบ</button>
          </td>
        `;
        historyList.appendChild(tr);
      });
    }

    function viewHistoryItem(index) {
      const history = JSON.parse(localStorage.getItem("driver_income_history")) || [];
      const item = history[index];

      document.getElementById('date').value = item.date;
      document.getElementById('grab').value = item.grab || '';
      document.getElementById('bolt').value = item.bolt || '';
      document.getElementById('tip').value = item.tip || '';
      document.getElementById('extraIncome').value = item.extraIncome || '';
      document.getElementById('oil').value = item.oil || '';
      document.getElementById('otherExpense').value = item.otherExpense || '';
      document.getElementById('startKm').value = item.startKm || '';
      document.getElementById('endKm').value = item.endKm || '';

      calculateAndSave();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteHistoryItem(index) {
      if (confirm("❓ คุณต้องการลบประวัติรายการนี้ใช่หรือไม่?")) {
        let history = JSON.parse(localStorage.getItem("driver_income_history")) || [];
        history.splice(index, 1);
        localStorage.setItem("driver_income_history", JSON.stringify(history));
        displayHistory();
      }
    }

    function clearAllHistory() {
      if (confirm("⚠️ คุณต้องการลบประวัติทั้งหมดใช่หรือไม่? ข้อมูลจะถูกลบถาวรและไม่สามารถกู้คืนได้")) {
        localStorage.removeItem("driver_income_history");
        displayHistory();
        document.getElementById('result').style.display = 'none';
        document.getElementById('result').innerHTML = '';
      }
    }

    function saveAsPNG() {
      const target = document.getElementById('result');
      
      if (target.innerHTML === "" || target.style.display === 'none') {
        alert("⚠️ กรุณากรอกข้อมูลและกดคำนวณรายได้ให้เรียบร้อยก่อนบันทึกภาพ");
        return;
      }
      
      html2canvas(target, {
        scale: 2, 
        useCORS: true,
        backgroundColor: "#e6ffe6" 
      }).then(canvas => {
        const link = document.createElement('a');
        const dateInput = document.getElementById('date').value || 'summary';
        link.download = `สรุปรายได้_${dateInput}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(err => {
        alert('❌ ระบบบันทึกรูปภาพขัดข้อง กรุณาลองใหม่อีกครั้ง');
        console.error(err);
      });
    }

    function resetForm() {
      document.querySelectorAll('input:not(#date)').forEach(input => input.value = '');
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';
    }
  </script>
</body>
</html>
